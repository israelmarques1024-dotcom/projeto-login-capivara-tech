<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>site login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="area-login" id="area-login">
        <h1>Login</h1>
        <input type="email" placeholder="email" id="email">
        <input type="password" placeholder="senha" id="senha">
        <button id="btn-login">Login</button>
    </div>
    <div class="area-cad" id="area-cad">
        <h1>Cadastro</h1>
        <input type="email" placeholder="Email" id="email-cad">
        <input type="password" placeholder="senha" id="senha-cad">
        <button id="btn-cadastro">Cadastrar</button>
    </div>
    <div class="link-cad" id="link-cad">
        <p>Não tem uma conta? <a href="" id="link-cad">Crie uma!</a></p>
    </div>
    <script src="index.js"></script>
</body>

</html>
